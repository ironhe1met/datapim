# SPA-friendly nginx config — used inside the frontend container.
# The outer reverse-proxy (deploy/nginx-prod.conf) handles SSL, /api/*, /uploads/*.
# This server only serves the built React bundle.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets (Vite emits content-hashed filenames in /assets/).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Never cache the entry HTML — it points at the latest hashed bundle.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — any client-side route renders index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cheap container healthcheck endpoint.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
