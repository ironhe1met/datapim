name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — pytest against a real Postgres
  # ---------------------------------------------------------------------------
  backend-test:
    name: backend / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datapim_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/datapim_test
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      ENVIRONMENT: test
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt1-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run alembic migrations
        run: alembic upgrade head

      - name: Run pytest
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Backend — ruff lint + format check
  # ---------------------------------------------------------------------------
  ruff:
    name: backend / ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.7.4
      - run: ruff check .
      - run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Frontend — typecheck + production build
  # ---------------------------------------------------------------------------
  frontend-test:
    name: frontend / typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npx tsc -b --noEmit

      - name: Production build
        env:
          VITE_API_URL: https://datapim.example.com
        run: npm run build
