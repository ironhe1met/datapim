# DataPIM — internal nginx (HTTP only, no SSL).
# Mounted into the docker nginx container. Listens on :80 inside container,
# mapped to LISTEN_PORT (default 3000) on the host.
# SSL terminates on the external proxy VPS.

limit_req_zone $binary_remote_addr zone=export_zone:10m rate=30r/m;

upstream datapim_backend  { server backend:8000;  keepalive 16; }
upstream datapim_frontend { server frontend:80;   keepalive 16; }

gzip              on;
gzip_vary         on;
gzip_min_length   1024;
gzip_proxied      any;
gzip_comp_level   6;
gzip_types text/plain text/css text/xml application/javascript
           application/json application/xml image/svg+xml;

proxy_http_version 1.1;
proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
proxy_set_header   X-Forwarded-Host  $host;
proxy_set_header   Connection        "";

server {
    listen 80;
    server_name _;

    client_max_body_size 12m;

    # API
    location /api/ {
        proxy_pass         http://datapim_backend;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health
    location ~ ^/(health|ready)$ {
        access_log off;
        proxy_pass http://datapim_backend;
    }

    # Public XML export (rate-limited)
    location /export/ {
        limit_req       zone=export_zone burst=10 nodelay;
        limit_req_status 429;
        proxy_pass      http://datapim_backend;
    }

    # Uploaded images — direct serve
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # OpenAPI docs
    location /docs { proxy_pass http://datapim_backend; }
    location /openapi.json { proxy_pass http://datapim_backend; }

    # Everything else → frontend SPA
    location / {
        proxy_pass http://datapim_frontend;
    }
}
