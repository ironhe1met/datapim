# DataPIM — production reverse proxy (mounted into nginx:alpine)
# Path inside container: /etc/nginx/conf.d/default.conf
#
# Replace `datapim.example.com` with your real domain before first deploy.
# SSL certs are obtained via certbot — see .ai/devops_runbook.md.

# --- Rate-limit zone for the public XML export endpoint -------------------
# 30 req/min per source IP.  10MB of state ≈ 160k unique IPs.
limit_req_zone $binary_remote_addr zone=export_zone:10m rate=30r/m;

# --- Upstreams -------------------------------------------------------------
upstream datapim_backend  { server backend:8000;  keepalive 16; }
upstream datapim_frontend { server frontend:80;   keepalive 16; }

# --- Gzip ------------------------------------------------------------------
gzip              on;
gzip_vary         on;
gzip_min_length   1024;
gzip_proxied      any;
gzip_comp_level   6;
gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml;

# --- Common proxy headers --------------------------------------------------
proxy_http_version 1.1;
proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
proxy_set_header   X-Forwarded-Host  $host;
proxy_set_header   Connection        "";

# --- HTTP -> HTTPS redirect + ACME challenge -------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name datapim.example.com;

    # ACME http-01 challenge (certbot --webroot -w /var/www/certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS server -----------------------------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name datapim.example.com;

    # SSL — get via certbot, see runbook.
    # certbot certonly --webroot -w /var/www/certbot -d datapim.example.com
    ssl_certificate     /etc/letsencrypt/live/datapim.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datapim.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers --------------------------------------------------
    add_header X-Frame-Options           "DENY"               always;
    add_header X-Content-Type-Options    "nosniff"            always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "0"                  always;

    # --- Body size (10MB image uploads + a little headroom) ----------------
    client_max_body_size 12m;

    # --- API ---------------------------------------------------------------
    location /api/ {
        proxy_pass         http://datapim_backend;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- /health, /ready (backend) ----------------------------------------
    location ~ ^/(health|ready)$ {
        access_log off;
        proxy_pass http://datapim_backend;
    }

    # --- Public XML export — rate-limited ----------------------------------
    location /export/ {
        limit_req       zone=export_zone burst=10 nodelay;
        limit_req_status 429;
        proxy_pass      http://datapim_backend;
        proxy_read_timeout 60s;
        # Allow nginx to cache the XML for 5 minutes per URL.
        proxy_cache_valid 200 5m;
    }

    # --- Uploads (product images) — served straight off disk ---------------
    # Volume `uploads_data` is mounted read-only at /var/www/uploads.
    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        expires    7d;
        add_header Cache-Control "public, max-age=604800";
        try_files  $uri =404;
    }

    # --- Frontend SPA (everything else) ------------------------------------
    location / {
        proxy_pass http://datapim_frontend;
    }
}
